service: george-blog-subscribe

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-southeast-2'}
  stage: ${opt:stage, 'prod'}
  environment:
    SUBSCRIBERS_TABLE_NAME: ${env:SUBSCRIBERS_TABLE_NAME}
    RESEND_API_KEY: ${env:RESEND_API_KEY}
    RESEND_FROM_EMAIL: ${env:RESEND_FROM_EMAIL}
    RESEND_WEBHOOK_SECRET: ${env:RESEND_WEBHOOK_SECRET}
    SITE_BASE_URL: ${env:SITE_BASE_URL}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Scan
          Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${env:SUBSCRIBERS_TABLE_NAME}"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node20
    exclude:
      - '@aws-sdk/*'

package:
  individually: true

functions:
  subscribe:
    handler: subscribe.handler
    description: Subscribe an email address, save to DynamoDB, send confirmation email via Resend — invoked via POST /subscribe
    timeout: 10
    events:
      - http:
          path: /subscribe
          method: post
          cors: true

  confirm:
    handler: confirm.handler
    description: Confirm an email subscription
    timeout: 10
    events:
      - http:
          path: /subscribe/confirm
          method: get
          cors: true

  unsubscribe:
    handler: unsubscribe.handler
    description: Unsubscribe an email address via tokenised link
    timeout: 10
    events:
      - http:
          path: /subscribe/unsubscribe
          method: get
          cors: true

  bounceHandler:
    handler: bounce-handler.handler
    description: Handles Resend webhook events for bounces and complaints — marks subscribers as bounced/complained in DynamoDB
    timeout: 10
    events:
      - http:
          path: /webhook/resend
          method: post
          cors: false

  notifySubscribers:
    handler: notify.handler
    description: Send an email to all confirmed subscribers — invoke manually via AWS Console Test tab
    timeout: 60

