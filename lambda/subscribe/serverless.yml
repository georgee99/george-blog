service: george-blog-subscribe

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-southeast-2'}
  stage: ${opt:stage, 'prod'}
  environment:
    SUBSCRIBERS_TABLE_NAME: ${env:SUBSCRIBERS_TABLE_NAME}
    SES_SENDER_EMAIL: ${env:SES_SENDER_EMAIL}
    SITE_BASE_URL: ${env:SITE_BASE_URL}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Scan
          Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${env:SUBSCRIBERS_TABLE_NAME}"
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: '*'

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node20
    exclude:
      - '@aws-sdk/*'

package:
  individually: true

resources:
  Resources:
    SESBounceComplaintTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: george-blog-ses-bounce-complaint-${opt:stage, 'prod'}

  Outputs:
    SESBounceComplaintTopicArn:
      Value: !Ref SESBounceComplaintTopic
      Description: >
        ARN of the SNS topic for SES bounce/complaint notifications.
        Go to SES Console > Verified identities > your domain > Notifications
        and set both Bounces and Complaints to this topic ARN.

functions:
  subscribe:
    handler: subscribe.handler
    description: Subscribe an email address, save to DynamoDB, send confirmation email via SES
    timeout: 10
    events:
      - http:
          path: /subscribe
          method: post
          cors: true

  confirm:
    handler: confirm.handler
    description: Confirm an email subscription
    timeout: 10
    events:
      - http:
          path: /subscribe/confirm
          method: get
          cors: true

  unsubscribe:
    handler: unsubscribe.handler
    description: Unsubscribe an email address via tokenised link
    timeout: 10
    events:
      - http:
          path: /subscribe/unsubscribe
          method: get
          cors: true

  bounceHandler:
    handler: bounce-handler.handler
    description: Handles SES bounce and complaint SNS notifications — marks subscribers as bounced/complained in DynamoDB
    timeout: 30
    events:
      - sns:
          arn: !Ref SESBounceComplaintTopic
          topicName: george-blog-ses-bounce-complaint-${opt:stage, 'prod'}

  notifySubscribers:
    handler: notify.handler
    description: Send an email to all confirmed subscribers — invoke manually via AWS Console Test tab
    timeout: 60

