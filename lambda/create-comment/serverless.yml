service: george-blog-comments

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-southeast-2'}
  stage: ${opt:stage, 'prod'}
  environment:
    DATABASE_URL: ${env:DATABASE_URL}
    SNS_TOPIC_ARN: ${env:SNS_TOPIC_ARN}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: ${env:SNS_TOPIC_ARN}

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node20
    exclude:
      - '@aws-sdk/*'

package:
  individually: true

functions:
  getComments:
    handler: get-comments.handler
    description: Fetch the latest comments for a post from PostgreSQL
    timeout: 10
    vpc:
      securityGroupIds:
        - sg-0d5c20e5e8a4a6c3f  # lambda-create-comment-sg
      subnetIds:
        - subnet-056091637675f3760  # ap-southeast-2b
        - subnet-04e2fba02920b9b43  # ap-southeast-2a
        - subnet-014a0ed5dc09045e6  # ap-southeast-2c
    events:
      - http:
          path: /comments
          method: get
          cors: true

  createComment:
    handler: handler.handler
    description: Create a blog comment, save to PostgreSQL, notify via SNS
    timeout: 10
    vpc:
      securityGroupIds:
        - sg-0d5c20e5e8a4a6c3f  # lambda-create-comment-sg
      subnetIds:
        - subnet-056091637675f3760  # ap-southeast-2b
        - subnet-04e2fba02920b9b43  # ap-southeast-2a
        - subnet-014a0ed5dc09045e6  # ap-southeast-2c
    events:
      - http:
          path: /comments
          method: post
          cors: true
