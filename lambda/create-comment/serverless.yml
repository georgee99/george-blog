service: george-blog-comments

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-southeast-2'}
  stage: ${opt:stage, 'prod'}
  environment:
    DYNAMODB_TABLE_NAME: ${env:DYNAMODB_TABLE_NAME}
    SNS_TOPIC_ARN: ${env:SNS_TOPIC_ARN}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: ${env:SNS_TOPIC_ARN}
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Query
          Resource: ${env:DYNAMODB_TABLE_ARN}

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node20
    exclude:
      - '@aws-sdk/*'

package:
  individually: true

functions:
  getComments:
    handler: get-comments.handler
    description: Fetch all comments for a post from DynamoDB
    timeout: 10
    events:
      - http:
          path: /comments
          method: get
          cors: true

  createComment:
    handler: handler.handler
    description: Create a blog comment, save to DynamoDB, notify via SNS
    timeout: 10
    events:
      - http:
          path: /comments
          method: post
          cors: true
